<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SkillVision</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #000;
  color: #fff;
  height: 100dvh;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}

/* --- Setup Screen --- */
#setup-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100dvh;
  padding: 24px;
  gap: 20px;
  background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
}

#setup-screen h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

#setup-screen p {
  color: #888;
  font-size: 14px;
  text-align: center;
  max-width: 300px;
}

.mode-section {
  width: 100%;
  max-width: 340px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.mode-section h3 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #666;
}

.mode-btn {
  display: block;
  width: 100%;
  padding: 14px 16px;
  border: 1px solid #333;
  border-radius: 10px;
  background: #111;
  color: #fff;
  font-size: 15px;
  text-align: left;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}

.mode-btn:active { background: #222; }
.mode-btn.selected { border-color: #4a9eff; background: #0d1b2a; }

.mode-btn .desc {
  display: block;
  font-size: 12px;
  color: #888;
  margin-top: 4px;
}

.sop-section {
  width: 100%;
  max-width: 340px;
}

.sop-section label {
  display: block;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #666;
  margin-bottom: 8px;
}

.file-input-wrap {
  display: flex;
  gap: 8px;
}

.file-input-wrap input[type="file"] {
  flex: 1;
  font-size: 13px;
  color: #aaa;
}

.file-input-wrap button {
  padding: 8px 14px;
  border: 1px solid #333;
  border-radius: 8px;
  background: #222;
  color: #fff;
  font-size: 13px;
  cursor: pointer;
}

#sop-status {
  font-size: 12px;
  color: #4a9eff;
  margin-top: 6px;
  min-height: 18px;
}

#start-btn {
  width: 100%;
  max-width: 340px;
  padding: 16px;
  border: none;
  border-radius: 12px;
  background: #4a9eff;
  color: #fff;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
  transition: opacity 0.2s;
}

#start-btn:active { opacity: 0.8; }
#start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* --- Session Screen --- */
#session-screen {
  display: none;
  flex-direction: column;
  height: 100dvh;
}

#viewfinder {
  flex: 7;
  position: relative;
  background: #000;
  overflow: hidden;
}

#viewfinder video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#guidance-panel {
  flex: 3;
  display: flex;
  flex-direction: column;
  background: #111;
  border-top: 1px solid #222;
  min-height: 0;
}

#step-indicator {
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 600;
  color: #4a9eff;
  border-bottom: 1px solid #222;
  flex-shrink: 0;
}

#transcript {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px;
  font-size: 14px;
  line-height: 1.5;
  color: #ccc;
  white-space: pre-wrap;
  word-wrap: break-word;
  -webkit-overflow-scrolling: touch;
}

#controls {
  display: flex;
  gap: 6px;
  padding: 8px;
  border-top: 1px solid #222;
  flex-shrink: 0;
}

#text-input {
  flex: 1;
  padding: 10px 12px;
  border: 1px solid #333;
  border-radius: 8px;
  background: #1a1a1a;
  color: #fff;
  font-size: 14px;
  outline: none;
}

#text-input:focus { border-color: #4a9eff; }

.ctrl-btn {
  padding: 10px 14px;
  border: 1px solid #333;
  border-radius: 8px;
  background: #222;
  color: #fff;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
}

#end-btn {
  background: #3a1111;
  border-color: #5a2222;
  color: #ff6b6b;
}

#status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 12px;
  font-size: 11px;
  color: #666;
  background: #0a0a0a;
  flex-shrink: 0;
}

#status-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  margin-right: 5px;
}
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <h1>SkillVision</h1>
  <p>Real-time AI guidance for electrical work. Point your camera and follow along.</p>

  <div class="mode-section">
    <h3>Select Mode</h3>
    <button class="mode-btn selected" onclick="selectMode('')" id="btn-freeform">
      Freeform Guidance
      <span class="desc">General-purpose — ask about anything you see</span>
    </button>
    <div id="task-list"></div>
  </div>

  <div class="sop-section">
    <label>Optional: Upload Reference Document</label>
    <div class="file-input-wrap">
      <input type="file" id="sop-file" accept=".pdf,.txt">
      <button onclick="uploadSOP()">Upload</button>
    </div>
    <div id="sop-status"></div>
  </div>

  <button id="start-btn" onclick="startSession()">Start Session</button>
</div>

<!-- SESSION SCREEN -->
<div id="session-screen">
  <div id="viewfinder">
    <video id="camera" autoplay playsinline muted></video>
    <canvas id="capture-canvas" style="display:none;"></canvas>
  </div>
  <div id="guidance-panel">
    <div id="step-indicator">Ready</div>
    <div id="transcript"></div>
    <div id="controls">
      <input type="text" id="text-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendText()">
      <button class="ctrl-btn" onclick="sendText()">Send</button>
      <button class="ctrl-btn" id="end-btn" onclick="stopSession()">End</button>
    </div>
    <div id="status-bar">
      <span><span id="status-dot"></span><span id="status-text">Disconnected</span></span>
      <span id="session-timer">0:00</span>
    </div>
  </div>
</div>

<script>
// --- State ---
let ws = null;
let frameInterval = null;
let audioCtx = null;
let nextPlayTime = 0;
let selectedTaskId = '';
let sopId = '';
let timerInterval = null;
let sessionStart = 0;

// --- Setup: Load task templates ---
(async function loadTasks() {
  try {
    const resp = await fetch('/api/tasks');
    const tasks = await resp.json();
    const container = document.getElementById('task-list');
    tasks.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'mode-btn';
      btn.id = 'btn-' + t.id;
      btn.innerHTML = t.name + '<span class="desc">' + t.step_count + ' steps — ' + t.description + '</span>';
      btn.onclick = () => selectMode(t.id);
      container.appendChild(btn);
    });
  } catch (e) {
    console.error('Failed to load tasks:', e);
  }
})();

function selectMode(taskId) {
  selectedTaskId = taskId;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  const id = taskId ? 'btn-' + taskId : 'btn-freeform';
  const el = document.getElementById(id);
  if (el) el.classList.add('selected');
}

async function uploadSOP() {
  const fileInput = document.getElementById('sop-file');
  const status = document.getElementById('sop-status');
  if (!fileInput.files.length) { status.textContent = 'No file selected'; return; }

  const formData = new FormData();
  formData.append('file', fileInput.files[0]);
  status.textContent = 'Uploading...';

  try {
    const resp = await fetch('/api/upload-sop', { method: 'POST', body: formData });
    const result = await resp.json();
    sopId = result.sop_id;
    status.textContent = 'Uploaded (' + result.char_count.toLocaleString() + ' chars)';
  } catch (e) {
    status.textContent = 'Upload failed: ' + e.message;
  }
}

// --- Camera ---
async function startCamera() {
  const video = document.getElementById('camera');
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 768 }, height: { ideal: 768 } },
    audio: false
  });
  video.srcObject = stream;
  await video.play();
}

function stopCamera() {
  const video = document.getElementById('camera');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }
}

// --- Frame Capture (1 FPS) ---
function startFrameCapture() {
  const video = document.getElementById('camera');
  const canvas = document.getElementById('capture-canvas');
  canvas.width = 768;
  canvas.height = 768;
  const ctx = canvas.getContext('2d');

  frameInterval = setInterval(() => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    if (video.readyState < 2) return; // not ready yet

    ctx.drawImage(video, 0, 0, 768, 768);
    canvas.toBlob(blob => {
      if (!blob || !ws || ws.readyState !== WebSocket.OPEN) return;
      const reader = new FileReader();
      reader.onload = () => {
        const base64 = reader.result.split(',')[1];
        ws.send(JSON.stringify({ type: 'video', data: base64 }));
      };
      reader.readAsDataURL(blob);
    }, 'image/jpeg', 0.8);
  }, 1000);
}

function stopFrameCapture() {
  if (frameInterval) { clearInterval(frameInterval); frameInterval = null; }
}

// --- WebSocket ---
let reconnectAttempts = 0;
let sessionActive = false;

function connectWebSocket() {
  const params = new URLSearchParams();
  if (selectedTaskId) params.set('task_id', selectedTaskId);
  if (sopId) params.set('sop_id', sopId);

  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(protocol + '//' + location.host + '/ws/session?' + params);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    reconnectAttempts = 0;
    updateStatus('connecting');
  };

  ws.onmessage = (event) => {
    if (event.data instanceof ArrayBuffer) {
      handleAudioChunk(event.data);
    } else {
      handleJsonMessage(JSON.parse(event.data));
    }
  };

  ws.onclose = () => {
    updateStatus('disconnected');
    stopFrameCapture();
    if (sessionActive) {
      flushAudio();
      scheduleReconnect();
    }
  };

  ws.onerror = (err) => console.error('WebSocket error:', err);
}

function scheduleReconnect() {
  if (reconnectAttempts >= 5) { updateStatus('failed'); return; }
  const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 16000);
  reconnectAttempts++;
  updateStatus('reconnecting');
  setTimeout(connectWebSocket, delay);
}

// --- Audio Playback (24kHz 16-bit PCM) ---
let gainNode = null;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
  gainNode = audioCtx.createGain();
  gainNode.connect(audioCtx.destination);
  nextPlayTime = 0;
}

function handleAudioChunk(arrayBuffer) {
  if (!audioCtx) initAudio();
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }

  const int16 = new Int16Array(arrayBuffer);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) {
    float32[i] = int16[i] / 32768.0;
  }

  const audioBuffer = audioCtx.createBuffer(1, float32.length, 24000);
  audioBuffer.getChannelData(0).set(float32);

  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(gainNode);

  const now = audioCtx.currentTime;
  const startTime = Math.max(now, nextPlayTime);
  source.start(startTime);
  nextPlayTime = startTime + audioBuffer.duration;
}

function flushAudio() {
  // Disconnect and recreate gain node to stop all scheduled sources
  if (gainNode && audioCtx) {
    gainNode.disconnect();
    gainNode = audioCtx.createGain();
    gainNode.connect(audioCtx.destination);
  }
  nextPlayTime = 0;
}

// --- JSON Message Handling ---
function handleJsonMessage(msg) {
  switch (msg.type) {
    case 'connected':
      updateStatus('connected');
      startFrameCapture();
      break;
    case 'transcript':
      appendTranscript(msg.text);
      break;
    case 'interrupted':
      flushAudio();
      break;
    case 'turn_complete':
      break;
    case 'reconnecting':
      updateStatus('reconnecting');
      break;
    case 'error':
      appendTranscript('\n[Error: ' + msg.message + ']\n');
      break;
  }
}

// --- UI Updates ---
function appendTranscript(text) {
  const div = document.getElementById('transcript');
  div.textContent += text;
  div.scrollTop = div.scrollHeight;
}

function updateStatus(state) {
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  const colors = { connected: '#4CAF50', connecting: '#FFC107', reconnecting: '#FFC107', disconnected: '#f44336', failed: '#f44336' };
  dot.style.background = colors[state] || '#666';
  text.textContent = state.charAt(0).toUpperCase() + state.slice(1);
}

function updateTimer() {
  const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  document.getElementById('session-timer').textContent = m + ':' + String(s).padStart(2, '0');
}

function sendText() {
  const input = document.getElementById('text-input');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'text', data: text }));
  appendTranscript('\n[You]: ' + text + '\n');
  input.value = '';
}

// --- Session Lifecycle ---
async function startSession() {
  document.getElementById('setup-screen').style.display = 'none';
  const sessionScreen = document.getElementById('session-screen');
  sessionScreen.style.display = 'flex';

  try {
    await startCamera();
  } catch (e) {
    alert('Camera access denied. Please allow camera permissions and try again.');
    stopSession();
    return;
  }

  sessionActive = true;
  initAudio();
  connectWebSocket();

  sessionStart = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
}

function stopSession() {
  sessionActive = false;
  stopFrameCapture();
  stopCamera();
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; gainNode = null; }
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

  nextPlayTime = 0;
  reconnectAttempts = 0;
  document.getElementById('transcript').textContent = '';
  document.getElementById('step-indicator').textContent = 'Ready';
  document.getElementById('session-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  updateStatus('disconnected');
}
</script>
</body>
</html>
